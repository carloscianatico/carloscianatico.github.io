{% assign nav = site.data.navigation[page.lang | default: 'it'] %}
<header class="site-header-shell" data-header>
  <div class="site-shell site-header-inner">

    <a class="brand" href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">
      <span class="brand-mark">CS</span>
      <span class="brand-text">
        <strong>Carlo Scianatico</strong>
      </span>
    </a>

    <div class="header-controls">
      <button class="hamburger-menu" id="hamburger-btn" type="button" aria-label="Apri menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambia tema">🌙</button>
      {% include lang_switch.html %}
    </div>

  </div>
</header>

<nav class="nav-sidebar" id="nav-sidebar" aria-label="Menu di navigazione" aria-hidden="true">
  <div class="sidebar-header">
    <span class="sidebar-title">Menu</span>
    <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Chiudi menu">✕</button>
  </div>

  <div class="sidebar-search">
    <input type="text" id="nav-search-input" placeholder="🔍 Cerca pagina..." aria-label="Cerca pagina">
  </div>

  <div class="sidebar-section">
    <p class="sidebar-label">📌 Pagine</p>
    <div class="sidebar-nav" id="sidebar-nav-links">
      <a href="{{ '/' | relative_url }}"          class="sidebar-nav-link {% if page.url == '/' %}is-active{% endif %}">🏠 Home</a>
      <a href="{{ '/projects/' | relative_url }}" class="sidebar-nav-link {% if page.url == '/projects/' %}is-active{% endif %}">🚀 Progetti</a>
      <a href="{{ '/articles/' | relative_url }}" class="sidebar-nav-link {% if page.url == '/articles/' %}is-active{% endif %}">📝 Articoli</a>
    </div>
  </div>

  <div class="sidebar-section">
    <p class="sidebar-label">🔖 Da leggere</p>
    <div id="sidebar-reading-list" class="sidebar-reading-list">
      <p class="sidebar-empty">Clicca 🔖 su un articolo per salvarlo qui.</p>
    </div>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
