{% assign nav = site.data.navigation[page.lang | default: 'it'] %}
<header class="site-header-shell" data-header>
  <div class="site-shell site-header-inner">

    <a class="brand" href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">
      <span class="brand-mark">CS</span>
      <span class="brand-text">
        <strong>Carlo Scianatico</strong>
        <small>{% if page.lang == 'en' %}Economics, AI, startup{% else %}Economia, AI, startup{% endif %}</small>
      </span>
    </a>

    <div class="header-controls">
      {% include lang_switch.html %}
      <button class="hamburger-menu" id="hamburger-btn" type="button" aria-label="Apri menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambia tema">🌙</button>
    </div>

  </div>
</header>

<div class="nav-dropdown" id="nav-dropdown" aria-hidden="true">
  <div class="site-shell">
    <nav class="nav-dropdown-inner">
      {% for item in nav %}
        <a href="{{ item.url | relative_url }}" class="nav-dropdown-link {% if page.url == item.url %}is-active{% endif %}">{{ item.label }}</a>
      {% endfor %}
      <div class="nav-dropdown-search">
        <input type="text" id="nav-search-input" placeholder="🔍 Cerca..." aria-label="Cerca pagina">
      </div>
    </nav>
  </div>
</div>
<div class="nav-overlay" id="nav-overlay"></div>
